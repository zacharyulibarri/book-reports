<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bookreports.club — The Bookless Book Club</title>
  <style>

    @import url(//db.onlinewebfonts.com/c/91db3f2094638a07f654364bee66a81e?family=TeXGyreHeros);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0;
    }

    a:link, a:visited { color: #00ffff; text-decoration: none; }
    a:hover { color: #fff; }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    .hero {
      flex: 0 0 auto;
      padding: clamp(32px, 8vw, 72px) clamp(20px, 6vw, 80px) clamp(24px, 5vw, 48px);
      border-bottom: 1px solid #1e1e1e;
    }

    .hero-title {
      font-size: clamp(2.6rem, 10vw, 7rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 3px 3px 12px #000, 0 0 60px #00ffff22;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 14px;
    }

    /* The dot in .club pulses cyan */
    .hero-title .dot { color: #00ffff; }

    .hero-tagline {
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      color: #aaa;
      font-style: italic;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .hero-est {
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      color: #444;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-desc {
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      color: #555;
      max-width: 520px;
      line-height: 1.7;
    }

    .hero-about-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00ffff;
    }

    .hero-pick {
      margin-top: 10px;
      font-size: clamp(0.85rem, 1.6vw, 1rem);
      color: #666;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════
       CITY GRID
    ══════════════════════════════════════ */
    .city-grid {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    @media (max-width: 600px) {
      .city-grid { grid-template-columns: 1fr; }
    }

    .city-card {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(24px, 5vw, 56px);
      min-height: clamp(200px, 35vh, 400px);
      position: relative;
      border: 1px solid #111;
      text-decoration: none;
      overflow: hidden;
      transition: background 0.2s;
      cursor: pointer;
    }

    .city-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.2;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .city-card:hover .city-bg { opacity: 0.55; }

    /* Touch devices: no hover, so keep SVG visible at rest */
    @media (hover: none) {
      .city-bg { opacity: 0.45; }
    }

    /* Left card gets a right border divider */
    .city-card:first-child {
      border-right: 1px solid #1e1e1e;
    }

    .city-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #00ffff08 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .city-card:hover::before { opacity: 1; }

    /* Accent bar slides up from bottom on hover */
    .city-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #00ffff;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .city-card:hover::after { transform: scaleX(1); }

    .city-name {
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 8px #000;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 6px;
      transition: color 0.2s;
    }

    .city-card:hover .city-name { color: #00ffff; }

    .city-state {
      font-size: clamp(0.75rem, 1.5vw, 0.95rem);
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .city-arrow {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.8rem;
      transition: color 0.2s, letter-spacing 0.2s;
    }

    .city-card:hover .city-arrow {
      color: #00ffff;
      letter-spacing: 0.2em;
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      flex: 0 0 auto;
      border-top: 1px solid #111;
      padding: 14px clamp(20px, 6vw, 80px);
      font-size: 0.78rem;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer a { color: #444; }
    footer a:hover { color: #00ffff; }

  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       HERO
  ══════════════════════════════════════ -->
  <header class="hero">
    <h1 class="hero-title">bookreports<span class="dot">.</span>club</h1>
    <p class="hero-tagline">The Bookless Book Club</p>
    <p class="hero-est">Est. Boulder, CO, USA, 2018</p>
    <p class="hero-desc">
      There is no assigned book. There is only a time and a place.
      <a href="about.html" class="hero-about-link">Learn more about Book Reports &rarr;</a>
    </p>
    <p class="hero-pick">Pick a city.</p>
  </header>


  <!-- ══════════════════════════════════════
       CITY SELECTION
  ══════════════════════════════════════ -->
  <nav class="city-grid">

    <a href="/boulder" class="city-card">
      <img class="city-bg" src="/img/cities/Boulder.svg" alt="">
      <div class="city-name">Boulder</div>
      <div class="city-state">Colorado</div>
      <div class="city-arrow">Enter &rarr;</div>
    </a>

    <a href="/ithaca" class="city-card">
      <img class="city-bg" src="/img/cities/Ithaca.svg" alt="">
      <div class="city-name">Ithaca</div>
      <div class="city-state">New York</div>
      <div class="city-arrow">Enter &rarr;</div>
    </a>

  </nav>


  <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
  <footer>
    <span>bookreports.club</span>
    <span>
      <a href="/boulder">Boulder</a>
      &nbsp;&middot;&nbsp;
      <a href="/ithaca">Ithaca</a>
      &nbsp;&middot;&nbsp;
      <a href="about.html">About</a>
    </span>
  </footer>

</body>
</html>
