<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bookreports.club — The Bookless Book Club</title>

  <script src="/vendor/d3.min.js"></script>
  <script src="/vendor/topojson.min.js"></script>

  <style>

    @import url(//db.onlinewebfonts.com/c/91db3f2094638a07f654364bee66a81e?family=TeXGyreHeros);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden; /* one-screen layout */
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    a:link, a:visited { color: #00ffff; text-decoration: none; }
    a:hover { color: #fff; }

    /* ══════════════════════════════════════
       HERO (compact — map takes the stage)
    ══════════════════════════════════════ */
    .hero {
      flex: 0 0 auto;
      padding: clamp(18px, 4vw, 40px) clamp(20px, 5vw, 64px) clamp(12px, 2vw, 24px);
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px 32px;
    }

    .hero-left { flex: 0 0 auto; }

    .hero-about {
      font-size: clamp(0.78rem, 1.4vw, 0.92rem);
      color: #555;
      font-style: italic;
      max-width: 340px;
      line-height: 1.6;
      flex: 0 1 auto;
    }

    .hero-about a {
      display: block;
      margin-top: 4px;
      font-style: normal;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-title {
      font-size: clamp(1.8rem, 5vw, 3.6rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 10px #000, 0 0 50px #00ffff18;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .hero-title .dot { color: #00ffff; }

    .hero-tagline {
      font-size: clamp(0.85rem, 1.8vw, 1.1rem);
      color: #666;
      font-style: italic;
      letter-spacing: 0.04em;
      padding-bottom: 2px;
    }

    /* ══════════════════════════════════════
       MAP CONTAINER
    ══════════════════════════════════════ */
    .map-container {
      flex: 1 1 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── States ── */
    .state {
      fill: #0a0a0a;
      stroke: #1e1e1e;
      stroke-width: 0.5px;
      transition: fill 0.2s;
    }

    /* Subtle highlight for the state containing each city */
    .state-highlight {
      fill: #0f1a1a;
      stroke: #2a2a2a;
    }

    /* ── City markers ── */
    .city-group { cursor: pointer; }

    /* Outer pulsing ring */
    .city-ping {
      fill: none;
      stroke: #00ffff;
      stroke-width: 1px;
      opacity: 0;
      animation: ping 2.4s ease-out infinite;
    }

    .city-ping-2 {
      animation-delay: 1.2s;
    }

    @keyframes ping {
      0%   { r: 6px;  opacity: 0.8; }
      100% { r: 28px; opacity: 0;   }
    }

    /* Core dot */
    .city-dot {
      fill: #00ffff;
      stroke: #000;
      stroke-width: 1.5px;
      r: 5px;
      transition: r 0.15s, fill 0.15s;
      filter: drop-shadow(0 0 6px #00ffff88);
    }

    .city-group:hover .city-dot {
      r: 8px;
      fill: #fff;
      filter: drop-shadow(0 0 12px #00ffff);
    }

    /* Label */
    .city-label-name {
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      font-weight: bold;
      font-size: 15px;
      fill: #fff;
      pointer-events: none;
      text-shadow: 0 0 8px #000;
    }

    .city-label-sub {
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      font-size: 10px;
      fill: #666;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .city-label-enter {
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      font-size: 10px;
      fill: #00ffff;
      letter-spacing: 0.14em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .city-group:hover .city-label-enter { opacity: 1; }
    .city-group:hover .city-label-name  { fill: #00ffff; }

    /* ── "Pick a city" hint ── */
    .map-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #2a2a2a;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      flex: 0 0 auto;
      border-top: 1px solid #111;
      padding: 10px clamp(20px, 5vw, 64px);
      font-size: 0.72rem;
      color: #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    footer a { color: #333; }
    footer a:hover { color: #00ffff; }

    /* ══════════════════════════════════════
       MOBILE: allow scrolling, stack layout
    ══════════════════════════════════════ */
    @media (max-width: 600px) {
      html, body { overflow: auto; height: auto; }
      body { height: auto; min-height: 100vh; }
      .map-container { min-height: 60vw; height: 70vw; }
    }

  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-left">
      <h1 class="hero-title">bookreports<span class="dot">.</span>club</h1>
      <p class="hero-tagline">The Bookless Book Club &mdash; pick a city</p>
    </div>
    <p class="hero-about">
      No assigned books. No pressure. Just people who read things and want to talk about them.
      <a href="/about">What is this? &rarr;</a>
    </p>
  </header>

  <div class="map-container">
    <svg id="map"></svg>
    <div class="map-hint">Select a city to see upcoming events</div>
  </div>

  <footer>
    <span>bookreports.club</span>
    <span>
      <a href="/boulder">Boulder</a>
      &nbsp;&middot;&nbsp;
      <a href="/ithaca">Ithaca</a>
    </span>
  </footer>


  <script>
    // ── City data ─────────────────────────────────────────────────
    // coords: [longitude, latitude]
    const CITIES = [
      {
        name: 'Boulder',
        state: 'Colorado',
        fips: '08',        // Colorado FIPS code for state highlight
        path: '/boulder',
        coords: [-105.2705, 40.0150],
        labelAnchor: 'start',
        labelOffset: [14, 4],
      },
      {
        name: 'Ithaca',
        state: 'New York',
        fips: '36',        // New York FIPS code
        path: '/ithaca',
        coords: [-76.4983, 42.4440],
        labelAnchor: 'end',
        labelOffset: [-14, 4],
      },
    ];

    // ── Render map ────────────────────────────────────────────────
    async function renderMap() {
      const container = document.querySelector('.map-container');
      const svg = d3.select('#map');

      // Use the SVG's actual rendered size
      const W = container.offsetWidth;
      const H = container.offsetHeight;

      svg.attr('viewBox', `0 0 ${W} ${H}`);

      // AlbersUSA projection fitted to container
      const projection = d3.geoAlbersUsa()
        .scale(W * 1.28)
        .translate([W / 2, H / 2]);

      const path = d3.geoPath().projection(projection);

      // Load US topology
      let us;
      try {
        us = await d3.json('/vendor/us-states.json');
      } catch (e) {
        console.error('Failed to load map data:', e);
        return;
      }

      const states = topojson.feature(us, us.objects.states);
      const nationBorder = topojson.mesh(us, us.objects.states, (a, b) => a === b);

      const highlightFips = new Set(CITIES.map(c => c.fips));

      // ── Draw states ──
      svg.append('g')
        .selectAll('path')
        .data(states.features)
        .join('path')
        .attr('class', d =>
          highlightFips.has(d.id.toString().padStart(2, '0'))
            ? 'state state-highlight'
            : 'state'
        )
        .attr('d', path);

      // Nation border (slightly brighter)
      svg.append('path')
        .datum(nationBorder)
        .attr('fill', 'none')
        .attr('stroke', '#2a2a2a')
        .attr('stroke-width', '0.8px')
        .attr('d', path);

      // ── Draw city markers ──
      CITIES.forEach(city => {
        const [x, y] = projection(city.coords) || [0, 0];

        const g = svg.append('g')
          .attr('class', 'city-group')
          .attr('transform', `translate(${x},${y})`)
          .style('cursor', 'pointer')
          .on('click', () => { window.location.href = city.path; });

        // Ping rings (two, offset in time)
        g.append('circle').attr('class', 'city-ping');
        g.append('circle').attr('class', 'city-ping city-ping-2');

        // Core dot
        g.append('circle').attr('class', 'city-dot');

        // Labels
        const [lx, ly] = city.labelOffset;

        g.append('text')
          .attr('class', 'city-label-name')
          .attr('x', lx)
          .attr('y', ly - 3)
          .attr('text-anchor', city.labelAnchor)
          .attr('dominant-baseline', 'auto')
          .text(city.name);

        g.append('text')
          .attr('class', 'city-label-sub')
          .attr('x', lx)
          .attr('y', ly + 12)
          .attr('text-anchor', city.labelAnchor)
          .text(city.state);

        g.append('text')
          .attr('class', 'city-label-enter')
          .attr('x', lx)
          .attr('y', ly + 26)
          .attr('text-anchor', city.labelAnchor)
          .text('Enter →');
      });
    }

    // Re-render on resize (debounced)
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        d3.select('#map').selectAll('*').remove();
        renderMap();
      }, 120);
    });

    renderMap();
  </script>

</body>
</html>
