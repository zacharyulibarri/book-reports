<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book Reports | Boulder — Past Events</title>
  <style>

    @import url(//db.onlinewebfonts.com/c/91db3f2094638a07f654364bee66a81e?family=TeXGyreHeros);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      padding: 16px;
    }

    @media (min-width: 700px)  { body { padding: 24px 5%; } }
    @media (min-width: 1100px) { body { padding: 32px 12%; } }

    a:link, a:visited { color: #00ffff; }
    a:hover { color: #fff; }

    .site-header {
      border-bottom: 1px solid #333;
      padding-bottom: 14px;
      margin-bottom: 24px;
    }

    .site-title {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 6px #000;
      letter-spacing: 0.02em;
    }

    .site-tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: #aaa;
      font-style: italic;
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    .site-city {
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: #00ffff;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    nav {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    nav a {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: #00ffff;
      border: 1px solid #00ffff44;
      padding: 4px 12px;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }

    nav a:hover, nav a.active {
      background: #00ffff;
      color: #000;
    }

    h2 {
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 4px #000;
      margin: 36px 0 16px;
      letter-spacing: 0.04em;
    }

    .empty-state {
      border: 1px solid #1e1e1e;
      border-left: 4px solid #333;
      background: #060606;
      padding: 40px 32px;
      border-radius: 2px;
      margin-top: 8px;
      max-width: 560px;
    }

    .empty-state-icon {
      font-size: 2rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state-heading {
      font-size: clamp(1.1rem, 2.8vw, 1.35rem);
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .empty-state-body {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.7;
    }

    footer {
      border-top: 1px solid #1a1a1a;
      margin-top: 48px;
      padding-top: 16px;
      font-size: 0.8rem;
      color: #444;
      text-align: center;
    }

    footer a { color: #444; }
    footer a:hover { color: #00ffff; }

  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-title">bookreports.club</div>
    <div class="site-tagline">The Bookless Book Club</div>
    <div class="site-city">Boulder, CO</div>
    <nav>
      <a href="/">← All Cities</a>
      <a href="/boulder">Boulder</a>
      <a href="/ithaca">Ithaca</a>
    </nav>
  </header>

  <h2>Past Events in Boulder</h2>

  <div class="empty-state">
    <div class="empty-state-icon">○</div>
    <div class="empty-state-heading">No past events on record yet.</div>
    <p class="empty-state-body">
      Once events have come and gone, they'll be archived here.
      <br><br>
      <a href="/boulder">See upcoming Boulder events &rarr;</a>
    </p>
  </div>

  <footer>
    <a href="/">bookreports.club</a> &nbsp;&middot;&nbsp;
    <a href="/boulder">Boulder</a> &nbsp;&middot;&nbsp;
    <a href="/ithaca">Ithaca</a>
  </footer>

</body>
</html>
